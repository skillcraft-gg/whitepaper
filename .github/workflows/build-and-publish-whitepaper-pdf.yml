name: Build and publish whitepaper PDF

on:
  push:
    branches:
      - main
  workflow_dispatch:
  issues:
    types: [opened, edited, labeled, unlabeled, reopened, closed]

permissions:
  contents: read
  issues: read
  pages: write
  id-token: write

concurrency:
  group: whitepaper-pages
  cancel-in-progress: true

jobs:
  build:
    if: >
      github.event_name != 'issues' ||
      (github.event.action == 'labeled' && contains(fromJSON('["roadmap:now","roadmap:next","roadmap:later","roadmap:released"]'), github.event.label.name)) ||
      (github.event.action == 'unlabeled' && contains(fromJSON('["roadmap:now","roadmap:next","roadmap:later","roadmap:released"]'), github.event.label.name)) ||
      (contains(fromJSON('["opened","edited","reopened","closed"]'), github.event.action) && (contains(github.event.issue.labels.*.name, 'roadmap:now') || contains(github.event.issue.labels.*.name, 'roadmap:next') || contains(github.event.issue.labels.*.name, 'roadmap:later') || contains(github.event.issue.labels.*.name, 'roadmap:released')))
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build changelog
        uses: skillcraft-gg/docs/.github/actions/build-changelog@main

      - name: Build roadmap
        uses: skillcraft-gg/docs/.github/actions/build-roadmap@main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc texlive-xetex

      - name: Build whitepaper PDF
        run: make build

      - name: Prepare Pages artifact
        run: |
          mkdir -p publish/meta
          cp skillcraft.pdf publish/
          cp meta/changelog.json publish/meta/changelog.json
          cp meta/roadmap.json publish/meta/roadmap.json

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./publish

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
